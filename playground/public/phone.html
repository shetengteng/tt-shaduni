<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TT ShadUni — Phone Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f8f8f8;--fg:#0a0a0a;--muted:#a3a3a3;--border:#e5e5e5;--phone-w:390px;--phone-h:844px}
    .dark{--bg:#0a0a0a;--fg:#fafafa;--muted:#737373;--border:#262626}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;transition:background .4s,color .4s}
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .toolbar h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
    .toolbar button{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg);font-size:14px;transition:border-color .3s}
    .toolbar button:hover{border-color:var(--fg)}
    .phone{position:relative;width:var(--phone-w);height:var(--phone-h);border-radius:48px;background:#000;box-shadow:0 0 0 2px #333,0 20px 60px rgba(0,0,0,.25),inset 0 0 0 2px #1a1a1a;overflow:hidden}
    .phone-screen{position:absolute;top:12px;left:12px;right:12px;bottom:12px;border-radius:38px;overflow:hidden;background:#fff}
    .phone-notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:0 0 18px 18px;z-index:10}
    .phone-notch::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:60px;height:6px;background:#1a1a1a;border-radius:3px}
    .phone-home{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:120px;height:4px;background:#333;border-radius:2px;z-index:10}
    iframe{width:100%;height:100%;border:none}
    .hint{margin-top:16px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>TT ShadUni Playground</h1>
    <button id="themeBtn" title="Toggle theme">&#x263E;</button>
  </div>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <iframe id="frame" src="/"></iframe>
    </div>
    <div class="phone-home"></div>
  </div>
  <div class="hint">iPhone 14 Pro · 390 × 844</div>
  <script>
    const btn = document.getElementById('themeBtn')
    let dark = false
    btn.addEventListener('click', () => {
      dark = !dark
      document.documentElement.classList.toggle('dark', dark)
      btn.innerHTML = dark ? '&#x2600;' : '&#x263E;'
    })
  </script>
</body>
</html>
